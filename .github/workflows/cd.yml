  #     - name: Set up Flutter
  #       uses: subosito/flutter-action@v2
  #       with:
  #         flutter-version: ${{ env.FLUTTER_VERSION }}

  #     - name: Get dependencies
  #       run: cd mobile && flutter pub get

  #     - name: Build release APK
  #       run: cd mobile && flutter build apk --release

  #     - name: Build iOS (simulator only - requires Mac)
  #       if: false  # Disabled by default, enable on macOS runner
  #       run: cd mobile && flutter build ios --simulator --no-codesign

  #     - name: Upload release APK
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: release-apk
  #         path: mobile/build/app/outputs/flutter-apk/app-release.apk

  #     # Upload to GitHub Releases
  #     - name: Create Release
  #       if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #       uses: softprops/action-gh-release@v1
  #       with:
  #         files: mobile/build/app/outputs/flutter-apk/app-release.apk
  #         generate_release_notes: true
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to staging (placeholder - customize for your needs)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Add your deployment commands here
          # Examples:
          # - kubectl apply -f k8s/staging/
          # - terraform apply
          # - ansible-playbook deploy.yml

  # Deploy to production via SSH
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: production
      url: https://gamification.boskale.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "internal,docs-portal,Dockerfile,docker-compose.yml,docker-compose.prod.yml,.env"
          target: "/var/www/gamification"
          rm: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Starting deployment to VPS..."
            cd /var/www/gamification
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build
            echo "Deployment successful."

  # Notify on deployment (Slack, etc.)
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment completed!"
          # Add notification logic here (Slack, Discord, email, etc.)