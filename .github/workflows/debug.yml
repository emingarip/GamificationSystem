name: Debug Server
on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix port conflict and restart muscle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Stopping orphaned admin container ==="
            docker stop gamification-admin-prod || true
            docker rm gamification-admin-prod || true
            echo "=== Restarting gamification stack ==="
            cd /var/www/gamification
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build
            echo "=== Waiting 15 seconds for services to start ==="
            sleep 15
            echo "=== Container status ==="
            docker ps -a | grep gamification
            echo "=== Muscle container logs ==="
            docker logs gamification-muscle-prod --tail 50
